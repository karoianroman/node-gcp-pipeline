name: CI/CD → Google Artifact Registry

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: app-service

jobs:
  # ─────────────────────────────────────────
  # 1. Етап Тестування
  # ─────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Settings Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies and testing
        run: |
          npm ci
          npm test

      - name: Smoke test via CURL
        run: |
          node server.js & # Запускаємо сервер у фоні
          sleep 5 # Даємо йому 5 секунд увімкнутися
          curl -f http://localhost:3000/ # Перевіряємо, чи він відповідає!

  # ─────────────────────────────────────────
  # 2. Етап Збірки та Пушу (тільки для push)
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build and Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Autorization on Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Settings Docker for GCP
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Docker-image
        run: |
          # Використовуємо один залізобетонний тег: повний SHA коміту
          IMAGE_TAG="europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/app/app:${{ github.sha }}"
          
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

  # ─────────────────────────────────────────
  # 3. Етап Деплою (тільки для гілки main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Autorization on Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # Тут вказуємо ТОЧНО той самий шлях, що й у збірці зверху
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/app/app:${{ github.sha }}
          flags: '--allow-unauthenticated'

      - name: Output URL
        run: echo "✅ Deployed on ${{ steps.deploy.outputs.url }}"
